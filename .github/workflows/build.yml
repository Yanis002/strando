name: Build

on:
  push:
  pull_request:
  release:
    types:
      - created
  workflow_dispatch:

permissions:
  contents: write
  packages: read

jobs:
  build:
    container: ghcr.io/yanis002/st-build:main

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: [eur]
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Git config
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global user.name "GitHub CI"

      - name: Prepare
        run: |
          mv /extract/* ./extract
          mv /tools/armips/* ./tools/armips

      - name: Build
        run: |
          make init
          make setup
          make patch

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: stgz-${{ matrix.version }}-${{ github.sha }}
          path: |
            stgz-${{ matrix.version }}.ppf
            build/${{ matrix.version }}/*.map
            hooks/build/${{ matrix.version }}/*.map

      - name: Upload rolling release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          name: 'Rolling release'
          body: Release built from latest commit on `main` branch. Check the commit history for more details.
          target_commitish: main
          tag_name: 'rolling-release'
          prerelease: false
          files: stgz-${{ matrix.version }}.ppf
        continue-on-error: true
